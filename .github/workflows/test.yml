name: Jest Supertest CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  PGHOST: localhost
  PGPORT: 5432
  PGUSER: testuser
  PGPASSWORD: testpassword
  NODE_VERSION: 20.x

jobs:
  test:
    name: Run Jest Supertest Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # -------------------------------------------------------
      # backend/lib/postbase
      # -------------------------------------------------------
      - name: "[backend] Install dependencies"
        working-directory: backend/lib/postbase
        run: npm ci

      - name: "[backend] Create test database"
        run: psql -h localhost -U testuser -c "CREATE DATABASE backend_testdb;"
        env:
          PGPASSWORD: testpassword

      - name: "[backend] Run migrations"
        working-directory: backend/lib/postbase
        run: npx node-pg-migrate up
        env:
          TEST_DB_URL: postgresql://testuser:testpassword@localhost:5432/backend_testdb

      - name: "[backend] Run Jest tests"
        working-directory: backend/lib/postbase
        run: npm test
        env:
          NODE_ENV: test
          TEST_DB_URL: postgresql://testuser:testpassword@localhost:5432/backend_testdb
          PGDATABASE: backend_testdb

      - name: "[backend] Upload coverage report"
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: backend/lib/postbase/coverage/
          retention-days: 7

      # -------------------------------------------------------
      # frontend/lib/postbase
      # -------------------------------------------------------
      - name: "[frontend] Install dependencies"
        working-directory: frontend/lib/postbase
        run: npm ci

      - name: "[frontend] Create test database"
        run: psql -h localhost -U testuser -c "CREATE DATABASE frontend_testdb;"
        env:
          PGPASSWORD: testpassword

      - name: "[frontend] Run migrations"
        working-directory: frontend/lib/postbase
        run: npx node-pg-migrate up
        env:
          TEST_DB_URL: postgresql://testuser:testpassword@localhost:5432/frontend_testdb

      - name: "[frontend] Run Jest tests"
        working-directory: frontend/lib/postbase
        run: npm test
        env:
          NODE_ENV: test
          TEST_DB_URL: postgresql://testuser:testpassword@localhost:5432/frontend_testdb
          PGDATABASE: frontend_testdb

      - name: "[frontend] Upload coverage report"
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/lib/postbase/coverage/
          retention-days: 7