name: Jest Supertest CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Run Jest Supertest Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        run: |
          git clone "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" .
          git checkout ${{ github.sha }}

      - name: Set up Node.js
        run: |
          curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
          sudo apt-get install -y nodejs

      # -------------------------------------------------------
      # backend/lib/postbase
      # -------------------------------------------------------
      - name: "[backend] Install dependencies"
        run: cd ./backend/lib/postbase && npm ci

      - name: "[backend] Create test database"
        run: psql -h localhost -U testuser -d postgres -c "CREATE DATABASE backend_testdb;"
        env:
          PGPASSWORD: testpassword

      - name: "[backend] Run migrations"
        run: cd ./backend/lib/postbase && npx node-pg-migrate up
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/backend_testdb 
          TEST_DB_URL: postgresql://testuser:testpassword@localhost:5432/backend_testdb

      - name: "[backend] Run Jest tests"
        run: cd ./backend/lib/postbase && npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/backend_testdb
          TEST_DB_URL: postgresql://testuser:testpassword@localhost:5432/backend_testdb
          PGDATABASE: backend_testdb

      - name: "[backend] Save coverage report"
        run: |
          mkdir -p /tmp/coverage-backend
          cp -r backend/lib/postbase/coverage/. /tmp/coverage-backend/
          echo "Coverage saved to runner at /tmp/coverage-backend"

      # -------------------------------------------------------
      # frontend/lib/postbase
      # -------------------------------------------------------
      - name: "[frontend] Install dependencies"
        run: cd ./frontend/lib/postbase && npm ci

      - name: "[frontend] Create test database"
        run: psql -h localhost -U testuser -d postgres -c "CREATE DATABASE frontend_testdb;"
        env:
          PGPASSWORD: testpassword

      - name: "[frontend] Run migrations"
        run: cd ./frontend/lib/postbase && npx node-pg-migrate up
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/frontend_testdb
          TEST_DB_URL: postgresql://testuser:testpassword@localhost:5432/frontend_testdb

      - name: "[frontend] Run Jest tests"
        run: cd ./frontend/lib/postbase && npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/frontend_testdb
          TEST_DB_URL: postgresql://testuser:testpassword@localhost:5432/frontend_testdb
          PGDATABASE: frontend_testdb

      - name: "[frontend] Save coverage report"
        run: |
          mkdir -p /tmp/coverage-frontend
          cp -r frontend/lib/postbase/coverage/. /tmp/coverage-frontend/
          echo "Coverage saved to runner at /tmp/coverage-frontend"